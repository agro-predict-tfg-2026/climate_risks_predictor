openapi: 3.1.0
info:
  title: Prediction Service API
  description: API para predicciones de heladas y plagas agrícolas
  version: 1.0.0

paths:

  /heladas/observadas/{tipo}:
    get:
      summary: Predicción de heladas observadas
      description: >
        Obtiene la predicción de heladas observadas para el tipo indicado.
        Se debe especificar obligatoriamente o el código de provincia o el código de estación (no ambos).
      tags:
        - Heladas
      parameters:
        - name: tipo
          in: path
          required: true
          description: Tipo de dato a solicitar
          schema:
            type: string
            enum: [hora, dia, semana]
        - name: province
          in: query
          required: false
          description: Código de la provincia (excluyente con 'estacion')
          schema:
            type: string
        - name: estacion
          in: query
          required: false
          description: Código de la estación meteorológica (excluyente con 'province')
          schema:
            type: string
        - name: evaluacion
          in: query
          required: false
          description: Indica si se debe incluir la evaluación de riesgo por variedades de cultivo
          schema:
            type: string
            enum: [true, false, 1, 0, yes, no, si]
            default: "false"
        - name: variedades
          in: query
          required: false
          description: >
            Lista de variedades de cultivo separadas por comas para filtrar la evaluación de riesgo.
            Los nombres deben coincidir con los devueltos por el endpoint /heladas/variedades.
          schema:
            type: string
            example: "manzana,pera,cerezo"
      responses:
        "200":
          description: Predicción de heladas observadas obtenida correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrediccionHeladasObservadas"
        "400":
          description: Parámetros inválidos o incompletos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"

  /heladas/variedades:
    get:
      summary: Listar variedades de cultivo disponibles
      description: >
        Devuelve el listado de variedades de cultivo disponibles para usar
        en el parámetro 'variedades' de los demás endpoints de heladas.
      tags:
        - Heladas
      responses:
        "200":
          description: Listado de variedades disponibles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VariedadesDisponibles'
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"

  /heladas/futuras/{zona}:
    get:
      summary: Predicción de heladas futuras
      description: >
        Obtiene predicciones de heladas futuras para una zona geográfica determinada.
        Se puede filtrar opcionalmente por provincia o comunidad autónoma (no ambas a la vez),
        y se puede incluir la evaluación de riesgo por variedades de cultivo y/o por localidades.
      tags:
        - Heladas
      parameters:
        - name: zona
          in: path
          required: true
          description: Zona geográfica para la predicción
          schema:
            type: string
        - name: provinciaId
          in: query
          required: false
          description: ID de la provincia (excluyente con 'ccaaId')
          schema:
            type: string
        - name: ccaaId
          in: query
          required: false
          description: ID de la comunidad autónoma (excluyente con 'provinciaId')
          schema:
            type: string
        - name: evaluacion_var
          in: query
          required: false
          description: Incluir evaluación de riesgo por variedades de cultivo
          schema:
            type: string
            enum: [true, false, 1, 0, yes, no, si]
            default: "false"
        - name: evaluacion_loc
          in: query
          required: false
          description: Incluir evaluación de riesgo por localidades
          schema:
            type: string
            enum: [true, false, 1, 0, yes, no, si]
            default: "false"
        - name: variedades
          in: query
          required: false
          description: >
            Lista de variedades de cultivo separadas por comas.
            Los nombres deben coincidir con los devueltos por el endpoint /heladas/variedades.
          schema:
            type: string
            example: "manzana,pera"
        - name: localidades
          in: query
          required: false
          description: >
            Lista de localidades separadas por comas para filtrar la evaluación de riesgo.
          schema:
            type: string
            example: "plasencia,caceres"
      responses:
        "200":
          description: Predicción de heladas futuras obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                description: Datos de predicción de heladas futuras
                $ref: '#/components/schemas/PrediccionHeladasFuturas'
        "400":
          description: Parámetros inválidos o incompletos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"

  /plagas/calculadas:
    get:
      summary: Predicción de plagas calculadas
      description: >
        Obtiene la predicción de riesgo de plagas calculadas para un cultivo específico.
      tags:
        - Plagas
      parameters:
        - name: cultivo
          in: query
          required: true
          description: Nombre del cultivo para el que se desea obtener la predicción de plagas
          schema:
            type: string
            example: "trigo"
      responses:
        "200":
          description: Predicción de plagas calculadas obtenida correctamente
          content:
            application/json:
              schema:
                description: Datos de predicción de plagas calculadas
                $ref: '#/components/schemas/PrediccionPlagasCalculadas'
        "400":
          description: Parámetro 'cultivo' no indicado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
        "404":
          description: No se han encontrado datos para el cultivo indicado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"

  /plagas/estimadas/{zona}/{fecha_ini}/{fecha_fin}:
    get:
      summary: Predicción de plagas estimadas
      description: >
        Obtiene predicciones estimadas de riesgo de plagas para uno o varios cultivos,
        en una zona y rango de fechas determinados.
        Se puede filtrar opcionalmente por provincia o comunidad autónoma (no ambas a la vez).
      tags:
        - Plagas
      parameters:
        - name: zona
          in: path
          required: true
          description: Zona geográfica para la predicción
          schema:
            type: string
        - name: fecha_ini
          in: path
          required: true
          description: Fecha de inicio del rango (formato YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2025-03-01"
        - name: fecha_fin
          in: path
          required: true
          description: Fecha de fin del rango (formato YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2025-03-31"
        - name: cultivos
          in: query
          required: true
          description: >
            Lista de cultivos para los que se desea la estimación.
            Se puede repetir el parámetro para indicar múltiples valores.
          schema:
            type: array
            items:
              type: string
            example: ["trigo", "cebada"]
          style: form
          explode: true
        - name: ccaa
          in: query
          required: false
          description: Código de la comunidad autónoma (excluyente con 'provincia')
          schema:
            type: string
        - name: provincia
          in: query
          required: false
          description: Código de la provincia (excluyente con 'ccaa')
          schema:
            type: string
      responses:
        "200":
          description: Predicción de plagas estimadas obtenida correctamente
          content:
            application/json:
              schema:
                description: Datos de predicción de plagas estimadas
                $ref: '#/components/schemas/PrediccionPlagasEstimadas'
        "400":
          description: Parámetros inválidos o incompletos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
        "404":
          description: No se han encontrado datos para los parámetros indicados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalError"

components:
  schemas:

    AlertaPlagaEstimada:
      type: object
      description: Alerta generada por la evaluación de umbrales de una plaga estimada
      properties:
        mensaje:
          type: string
          description: Descripción de la evaluación realizada
          example: "Evaluación de riesgos aplicando umbrales sobre la plaga Acaro del bronceado del tomate"
        recomendacion:
          type: string
          description: Acción recomendada ante la alerta
          example: "Eliminar las malas hierbas y restos de cultivos"
        nivel:
          type: string
          description: Nivel de gravedad de la alerta
          enum: [informativa, preventiva, advertencia, critica]
          example: "preventiva"
        nombre_plaga:
          type: string
          description: Nombre común de la plaga evaluada
          example: "Acaro del bronceado del tomate"
        agente_causante:
          type: string
          description: Especie responsable de la plaga
          example: "Phytophthora spp. (de Bary, 1876)"
        condiciones_cumplidas:
          type: array
          description: Condiciones umbrales que ya se han cumplido
          items:
            type: string
          example: ["Registradas 328 lecturas cuya humedad foliar <= 30.0"]
        condiciones_pendientes:
          type: array
          description: Condiciones umbrales que aún no se han cumplido
          items:
            type: string
          example: ["Temperatura maxima 12 ºC < 27.0 ºC requerido"]
        url_referencia:
          type: string
          nullable: true
          format: uri
          description: URL con información ampliada sobre la plaga
          example: "https://www.infoagro.com/proteccion_cultivos/phytophthora.htm"
        tipo_organismo:
          type: string
          description: Categoría del organismo causante
          enum: [acaro, insecto, hongo, bacteria, virus, nematodo]
          example: "acaro"

    ResumenCondiciones:
      type: object
      description: Resumen de las condiciones meteorológicas y sensoriales del período evaluado
      properties:
        temp_max_aemet:
          type: number
          format: float
          description: Temperatura máxima registrada por AEMET (°C)
          example: 12
        temp_min_aemet:
          type: number
          format: float
          description: Temperatura mínima registrada por AEMET (°C)
          example: 4
        precipitaciones:
          type: string
          nullable: true
          description: Descripción de las precipitaciones del período
          example: "precipitaciones débiles a moderadas"
        estado_cielo:
          type: string
          nullable: true
          description: Descripción del estado del cielo
          example: "Intervalos nubosos tendiendo a nuboso o cubierto"
        hr_foliar_media:
          type: number
          format: float
          description: Humedad relativa foliar media registrada por sensores (%)
          example: 17.1
        t_hoja_media:
          type: number
          format: float
          description: Temperatura media de la hoja registrada por sensores (°C)
          example: 12.2
        n_lecturas_sensor:
          type: integer
          description: Número total de lecturas del sensor en el período evaluado
          example: 461

    PrediccionPlagasEstimadas:
      type: array
      description: Respuesta con la estimación de riesgo de plagas por cultivo
      items:
        type: object
        properties:
          nombre_cultivo:
            type: string
            description: Nombre del cultivo evaluado
            example: "Tomate"
          fecha_evaluacion:
            type: string
            format: date-time
            description: Fecha y hora en la que se generó la evaluación
            example: "2026-03-13T09:50:20.847765"
          alertas:
            type: array
            description: Lista de alertas generadas para este cultivo
            items:
              $ref: '#/components/schemas/AlertaPlagaEstimada'
          resumen_condiciones:
            $ref: '#/components/schemas/ResumenCondiciones'

    NivelRiesgoPlaga:
      type: string
      description: Nivel de riesgo de la plaga o enfermedad
      enum: [BAJA, MEDIA, ALTA, MUY_ALTA]
      example: "ALTA"

    TipoAgente:
      type: string
      description: Indica si el agente es una plaga o una enfermedad
      enum: [plaga, enfermedad]
      example: "plaga"

    Plaga:
      type: object
      description: Información de una plaga o enfermedad asociada a un cultivo
      properties:
        nombre:
          type: string
          description: Nombre común de la plaga o enfermedad
          example: "HELMINTOSPORIOSIS"
        agente_causante:
          type: string
          description: Especie o especies responsables de la plaga o enfermedad
          example: "Dreschslera teres"
        momento_critico:
          type: string
          description: Etapa o periodo del cultivo con mayor riesgo de afección
          example: "Desde encañado hasta llenado de grano"
        observaciones:
          type: string
          description: Condiciones ambientales o agronómicas que favorecen su aparición
          example: "Infección en otoño-invierno, explotando en primavera"
        mas_info:
          type: string
          nullable: true
          format: uri
          description: URL con información ampliada sobre la plaga o enfermedad
          example: "https://plagas.itacyl.es/helmintosporisis"
        tipo:
          $ref: '#/components/schemas/TipoAgente'
        nivel_riesgo:
          $ref: '#/components/schemas/NivelRiesgoPlaga'

    CultivoPlagas:
      type: object
      description: Cultivo con su listado de plagas y enfermedades asociadas
      properties:
        cultivo:
          type: object
          description: Información básica del cultivo
          properties:
            nombre:
              type: string
              description: Nombre del cultivo
              example: "Maiz"
            grupo:
              type: string
              description: Grupo o categoría agronómica del cultivo
              example: "cereales"
        plagas:
          type: array
          description: Lista de plagas y enfermedades asociadas al cultivo
          items:
            $ref: '#/components/schemas/Plaga'

    PrediccionPlagasCalculadas:
      type: array
      description: Respuesta con la predicción de plagas calculadas, una entrada por cultivo consultado
      items:
        $ref: '#/components/schemas/CultivoPlagas'

    UmbralesRiesgo:
      type: object
      description: Temperaturas umbral que definen cada nivel de riesgo para una variedad
      properties:
        critico:
          type: number
          format: float
          description: Temperatura umbral de riesgo crítico (°C)
          example: -3.0
        alto:
          type: number
          format: float
          description: Temperatura umbral de riesgo alto (°C)
          example: 0.0
        moderado:
          type: number
          format: float
          description: Temperatura umbral de riesgo moderado (°C)
          example: 5.0
        bajo:
          type: number
          format: float
          description: Temperatura umbral de riesgo bajo (°C)
          example: 7.0

    EvaluacionVariedad:
      type: object
      description: Resultado de la evaluación de riesgo de helada para una variedad concreta
      properties:
        variedad:
          type: string
          description: Nombre normalizado de la variedad evaluada
          example: "lauranne"
        nombre_cientifico:
          type: string
          nullable: true
          description: Nombre científico de la variedad (puede ser nulo)
          example: null
        etapa_fenologica:
          type: string
          description: Etapa fenológica actual de la variedad
          example: "brotancia"
        temperatura_evaluada:
          type: number
          format: float
          description: Temperatura mínima prevista usada para la evaluación (°C)
          example: 4
        porcentaje_riesgo:
          type: number
          format: float
          description: Porcentaje de riesgo calculado (0-100)
          example: 39.99999868068652
        nivel_riesgo:
          $ref: '#/components/schemas/NivelRiesgo'
        umbrales:
          $ref: '#/components/schemas/UmbralesRiesgo'
        alertas:
          type: array
          items:
            $ref: '#/components/schemas/Alerta'
          description: Alertas específicas para esta variedad
          example: []

    DatosMeteorologicos:
      type: object
      description: Resumen de las condiciones meteorológicas previstas
      properties:
        estado_cielo:
          type: string
          nullable: true
          description: Descripción del estado del cielo previsto
          example: "Intervalos nubosos tendiendo a nuboso o cubierto"
        tendencia_temp_general:
          type: string
          nullable: true
          description: Tendencia general de la temperatura
          example: null
        tendencia_temp_maxima:
          type: string
          nullable: true
          description: Tendencia de la temperatura máxima
          example: "en descenso"
        tendencia_temp_minima:
          type: string
          nullable: true
          description: Tendencia de la temperatura mínima
          example: "sin cambios"
        rachas_viento:
          type: string
          nullable: true
          description: Descripción del viento previsto
          example: "viento del oeste o suroeste, flojo a moderado"
        precipitaciones:
          type: string
          nullable: true
          description: Descripción de las precipitaciones previstas
          example: "precipitaciones débiles a moderadas y algunas tormentas en el norte y este"
        cotas_nieve:
          type: string
          nullable: true
          description: Cotas de nieve previstas
          example: "1400 a 1600 metros bajando a 1000 y 700 metros"
        existencia_heladas:
          type: string
          nullable: true
          description: Indicación de si se esperan heladas
          example: null

    PrediccionHeladasFuturas:
      type: object
      description: Respuesta completa de la predicción de riesgo de heladas futuras
      properties:
        nivel:
          $ref: '#/components/schemas/NivelRiesgo'
        comentarios:
          type: string
          description: Resumen narrativo de la predicción
          example: "Predicciones futuras basadas en datos proporcionados por AEMET."
        alertas:
          type: array
          items:
            $ref: '#/components/schemas/Alerta'
          description: Lista de alertas activas para esta predicción
        contexto:
          $ref: '#/components/schemas/ContextoPrediccion'
        tipo_prediccion:
          type: string
          description: Horizonte temporal de la predicción
          enum: [hoy, tomorrow, semana, mes]
          example: "tomorrow"
        evaluaciones_variedades:
          allOf:
            - $ref: '#/components/schemas/EvaluacionesVariedades'
            - type: object
              properties:
                evaluaciones:
                  type: array
                  items:
                    $ref: '#/components/schemas/EvaluacionVariedad'
        riesgos_heladas_blancas:
          type: array
          items:
            $ref: '#/components/schemas/RiesgoHeladaBlanca'
          example: []
        riesgos_heladas_negras:
          type: array
          items:
            type: object
          example: []
        precision:
          type: string
          description: Nivel de precisión estimado de la predicción
          enum: [alta, media, baja]
          example: "media"
        datos_meteorologicos:
          $ref: '#/components/schemas/DatosMeteorologicos'
        evaluacion_localidades:
          type: object
          nullable: true
          description: Evaluación de riesgo por localidades (nulo si no se solicitó)
          example: null

    ModeloHorasFrio:
      type: object
      description: Modelo de cálculo de horas de frío asociado a una variedad
      properties:
        codigo:
          type: integer
          description: Identificador público del modelo
          example: 1
        nombre:
          type: string
          description: Nombre descriptivo del modelo
          example: "Unidad de Frio (UF)"
        descripcion:
          type: string
          description: Descripción del modelo con sus umbrales de medición
          example: "Acumular horas en las que la temperatura está comprendida entre 2.5-9.1 grados..."

    VariedadCultivo:
      type: object
      description: Variedad de cultivo disponible con sus umbrales de horas de frío
      properties:
        nombre:
          type: string
          description: Nombre descriptivo de la variedad
          example: "Guara"
        nombre_cultivo:
          type: string
          description: Nombre del cultivo al que pertenece la variedad
          example: "Almendro"
        horas_frio_min:
          type: integer
          description: Umbral mínimo de horas de frío requeridas
          example: 400
        horas_frio_max:
          type: integer
          description: Umbral máximo de horas de frío requeridas
          example: 600
        modelo:
          $ref: '#/components/schemas/ModeloHorasFrio'

    VariedadesDisponibles:
      type: object
      description: Respuesta con el listado de variedades de cultivo disponibles
      properties:
        total:
          type: integer
          description: Número total de variedades disponibles
          example: 12
        mensaje:
          type: string
          description: Instrucciones de uso del parámetro variedades
        cultivos_variedades:
          type: array
          description: Lista de variedades disponibles con su información completa
          items:
            $ref: '#/components/schemas/VariedadCultivo'

    NivelRiesgo:
      type: string
      description: Nivel de riesgo de helada
      enum: [sin_riesgo, debil, moderado, alto, critico]
      example: "sin_riesgo"

    Alerta:
      type: object
      description: Alerta o aviso relacionado con la predicción de helada
      properties:
        mensaje:
          type: string
          description: Texto descriptivo de la alerta
          example: "Precipitaciones recientes reducen el riesgo de heladas"
        recomendacion:
          type: string
          description: Acción recomendada al agricultor
          example: "Mantener vigilancia de las recomendaciones meteorológicas futuras"
        nivel:
          type: string
          description: Gravedad de la alerta
          enum: [informativa, advertencia, critica]
          example: "informativa"

    ContextoPrediccion:
      type: object
      description: Metadatos sobre el origen y tipo de la predicción
      properties:
        tipos_datos:
          type: array
          items:
            type: string
          description: Tipos de datos utilizados en la predicción
          example: ["historicos"]
        prediccion_o_estimacion:
          type: string
          description: Indica si el resultado es una predicción o una estimación
          enum: [prediccion, estimacion]
          example: "estimacion"
        fuente:
          type: array
          items:
            type: string
          description: Fuentes de datos utilizadas
          example: ["SiAR"]
        fecha_generacion:
          type: string
          format: date-time
          description: Fecha y hora de generación de la respuesta
          example: "2026-03-13T08:49:08.780531"

    EvaluacionesVariedades:
      type: object
      description: Resumen de la evaluación de riesgo de helada por variedades de cultivo
      properties:
        total_variedades_evaluados:
          type: integer
          example: 0
        variedades_en_riesgo_critico:
          type: integer
          example: 0
        variedades_en_riesgo_alto:
          type: integer
          example: 0
        variedades_en_riesgo_moderado:
          type: integer
          example: 0
        variedades_en_riesgo_debil:
          type: integer
          example: 0
        variedades_sin_riesgo:
          type: integer
          example: 0
        evaluaciones:
          type: array
          description: Detalle de la evaluación por variedad
          items:
            type: object
          example: []

    RiesgoHeladaBlanca:
      type: object
      description: Registro de condiciones favorables para helada blanca (temperatura ≤ 2°C y humedad elevada)
      properties:
        humedad:
          type: number
          format: float
          description: Porcentaje de humedad relativa registrada
          example: 89.13157894736842
        temperatura:
          type: number
          format: float
          description: Temperatura mínima registrada en °C
          example: 0.441
        timestamp:
          type: string
          format: date
          description: Fecha del registro
          example: "2026-02-06"
        estacion_id_temp:
          type: integer
          description: ID de la estación de la que proviene el dato de temperatura
          example: 26
        estacion_id_hum:
          type: array
          items:
            type: integer
          description: IDs de las estaciones de las que proviene el dato de humedad
          example: [26, 22]

    RegistroTemperaturaMinima:
      type: object
      description: Resumen histórico de temperaturas mínimas registradas
      properties:
        dias_bajo_cero:
          type: integer
          description: Número de días con temperatura mínima inferior a 0°C
          example: 8
        temperatura_minima_registrada:
          type: number
          format: float
          description: Temperatura mínima absoluta registrada en el período analizado
          example: 0.441
        fecha_temp_bajo_cero:
          type: array
          items:
            type: string
            format: date
          description: Fechas en las que se registraron temperaturas bajo cero
          example: ["2026-02-06"]

    PrediccionHeladasObservadas:
      type: object
      description: Respuesta completa de la predicción de riesgo de heladas observadas
      properties:
        nivel:
          $ref: "#/components/schemas/NivelRiesgo"
        comentarios:
          type: string
          description: Análisis narrativo detallado de la predicción
          example: "Analisis basado en 108 dias de datos historicos desde 12/09/2025 hasta 13/03/2026."
        alertas:
          type: array
          items:
            $ref: "#/components/schemas/Alerta"
          description: Lista de alertas o avisos activos
        contexto:
          $ref: "#/components/schemas/ContextoPrediccion"
        tipo_prediccion:
          type: string
          description: Granularidad temporal de la predicción
          enum: [hoy, semana, mes]
          example: "hoy"
        evaluaciones_variedades:
          $ref: "#/components/schemas/EvaluacionesVariedades"
        riesgos_heladas_blancas:
          type: array
          items:
            $ref: "#/components/schemas/RiesgoHeladaBlanca"
          description: Registros históricos con condiciones de helada blanca detectadas
        riesgos_heladas_negras:
          type: array
          items:
            type: object
          description: Registros históricos con condiciones de helada negra detectadas
          example: []
        fecha_comiezo_registros:
          type: string
          format: date
          description: Fecha de inicio del período de datos analizado
          example: "2025-09-12"
        fecha_fin_registros:
          type: string
          format: date
          description: Fecha de fin del período de datos analizado
          example: "2026-03-13"
        registro_temperatura_minima:
          $ref: "#/components/schemas/RegistroTemperaturaMinima"

    APIError:
      type: object
      properties:
        message:
          type: string
          description: Descripción del error
          example: "Solo se puede indicar el código de provincia o el código de estacion"
        status:
          type: integer
          description: Código HTTP del error
          example: 400
        error:
          type: string
          description: Tipo de error
          example: "Invalid parameters"

    InternalError:
      type: object
      properties:
        message:
          type: string
          example: "Error interno del servidor"
        status:
          type: integer
          example: 500
        error:
          type: string
          example: "Internal server error"

    GenericError:
      type: object
      properties:
        success:
          type: string
          example: "false"
        status:
          type: string
          example: "400"
        message:
          type: string
          example: "Invalid parameters"
        error:
          type: string
          example: "Se deben especificar los parámetros obligatorios"

tags:
  - name: Heladas
    description: Endpoints para predicciones de riesgo de heladas
  - name: Plagas
    description: Endpoints para predicciones de riesgo de plagas